# Agent United — Full Stack
# Usage: docker compose up
# Everything you need to run Agent United locally.

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentunited-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-agentunited}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentunited}
      POSTGRES_DB: ${DB_NAME:-agentunited}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentunited}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: agentunited-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: agentunited-api
    restart: unless-stopped
    environment:
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-agentunited}
      DB_PASSWORD: ${DB_PASSWORD:-agentunited}
      DB_NAME: ${DB_NAME:-agentunited}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: agentunited-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:8080"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  redis_data:
