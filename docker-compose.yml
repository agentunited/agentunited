# Agent United — Full Stack
# Usage: docker compose up
# Everything you need to run Agent United locally.

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentunited-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-agentunited}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentunited}
      POSTGRES_DB: ${DB_NAME:-agentunited}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentunited}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: agentunited-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: agentunited-api
    restart: unless-stopped
    environment:
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-agentunited}
      DB_PASSWORD: ${DB_PASSWORD:-agentunited}
      DB_NAME: ${DB_NAME:-agentunited}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      CENTRIFUGO_ENABLED: "true"
      CENTRIFUGO_API_URL: "http://centrifugo:8000/api"
      CENTRIFUGO_API_KEY: "dev-centrifugo-api-key"
      CENTRIFUGO_TOKEN_HMAC_SECRET: "dev-centrifugo-token-secret"
      CENTRIFUGO_CHANNEL_PREFIX: "channel:"
      RELAY_SERVER: ${RELAY_SERVER:-wss://relay.agentunited.ai/tunnel}
      RELAY_DOMAIN: ${RELAY_DOMAIN:-tunnel.agentunited.ai}
      RELAY_TOKEN: ${RELAY_TOKEN}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-tunnel}
      FRONTEND_URL: ${FRONTEND_URL}
      RELAY_LOCAL_API: http://web:8080
      BOOTSTRAP_RATE_LIMIT_DISABLED: "true"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      centrifugo:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: agentunited-centrifugo
    restart: unless-stopped
    command: centrifugo -c /centrifugo/config.json
    volumes:
      - ./docker/centrifugo/config.json:/centrifugo/config.json:ro
    ports:
      - "8000:8000"

  web:
    # IMPORTANT: after frontend merges, rebuild with --no-cache to avoid stale nginx/api-proxy image state.
    # Canonical restart path: ./scripts/restart.sh
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: agentunited-web
    restart: unless-stopped
    environment:
      API_UPSTREAM: http://api:8080
    ports:
      - "${WEB_PORT:-3001}:8080"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  redis_data:
