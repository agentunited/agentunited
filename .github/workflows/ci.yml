name: CI

on:
  pull_request:
    branches: [main]

jobs:
  go-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, central, billing-webhook]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/${{ matrix.service }}/go.mod
          cache-dependency-path: apps/${{ matrix.service }}/go.sum
      - name: Test ${{ matrix.service }}
        working-directory: apps/${{ matrix.service }}
        run: go test ./... -count=1

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Build web
        working-directory: apps/web
        run: |
          npm ci
          npm run build

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/docs/package-lock.json
      - name: Build docs
        working-directory: apps/docs
        run: |
          npm ci
          npm run build
