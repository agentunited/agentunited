name: Build iOS + Upload to TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (increment manually)'
        required: true
        default: '22'

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import distribution certificate
        env:
          CERT_B64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          CERT_PASS: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 --decode > /tmp/apple-distribution.p12
          # Create a temporary keychain
          security create-keychain -p "ci-keychain" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci-keychain" ci.keychain
          security set-keychain-settings -lut 21600 ci.keychain
          security import /tmp/apple-distribution.p12 -k ci.keychain -P "$CERT_PASS" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" ci.keychain

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.APPLE_PROV_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/AgentUnited_iOS_Distribution.mobileprovision

      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.event.inputs.build_number }}" apps/ios/AgentUnited/Info.plist || \
          agvtool new-version -all ${{ github.event.inputs.build_number }}

      - name: Build archive
        run: |
          xcodebuild archive \
            -project apps/ios/AgentUnited.xcodeproj \
            -scheme AgentUnited \
            -configuration Release \
            -archivePath /tmp/AgentUnited.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="AgentUnited iOS Distribution" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=G8QPW9SH2T \
            
          ls /tmp/AgentUnited.xcarchive

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>upload</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>ai.agentunited.app</key>
                  <string>AgentUnited iOS Distribution</string>
              </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath /tmp/AgentUnited.xcarchive \
            -exportPath /tmp/AgentUnited-export \
            -exportOptionsPlist /tmp/ExportOptions.plist
          ls /tmp/AgentUnited-export/

      - name: Upload to TestFlight
        env:
          KEY_B64: ${{ secrets.ASC_API_KEY_BASE64 }}
          KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          echo "$KEY_B64" | base64 --decode > /tmp/AuthKey_${KEY_ID}.p8
          IPA=$(ls /tmp/AgentUnited-export/*.ipa | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --apiKeyFilePath "/tmp/AuthKey_${KEY_ID}.p8" \
            --show-progress
