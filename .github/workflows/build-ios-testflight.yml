name: Build iOS + Upload to TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (increment manually)'
        required: true
        default: '22'

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import distribution certificate
        env:
          CERT_B64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          CERT_PASS: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 --decode > /tmp/apple-distribution.p12
          # Create a temporary keychain
          security create-keychain -p "ci-keychain" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci-keychain" ci.keychain
          security set-keychain-settings -lut 21600 ci.keychain
          security import /tmp/apple-distribution.p12 -k ci.keychain -P "$CERT_PASS" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" ci.keychain

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.APPLE_PROV_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/AgentUnited_iOS_Distribution.mobileprovision

      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.event.inputs.build_number }}" apps/ios/AgentUnited/Info.plist || \
          agvtool new-version -all ${{ github.event.inputs.build_number }}

      - name: Build for simulator + smoke test
        run: |
          set -euo pipefail
          xcrun simctl list devices available -j > /tmp/sim-devices.json
          UDID=$(python3 - <<'PY'
          import json
          data = json.load(open('/tmp/sim-devices.json'))
          preferred = ['iPhone 17 Pro', 'iPhone 17', 'iPhone 16 Pro']
          candidates = []
          for runtime, devs in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for dev in devs:
                  if dev.get('isAvailable'):
                      candidates.append((dev.get('name'), dev.get('udid')))
          for name in preferred:
              for dname, udid in candidates:
                  if dname == name:
                      print(udid)
                      raise SystemExit
          if candidates:
              print(candidates[0][1])
              raise SystemExit
          raise SystemExit('No available iOS simulator found')
          PY
          )

          xcodebuild build \
            -project apps/ios/AgentUnited.xcodeproj \
            -scheme AgentUnited \
            -destination "id=$UDID" \
            CODE_SIGNING_ALLOWED=NO

          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AgentUnited.app" -path "*/Debug-iphonesimulator/*" | head -1)
          test -n "$APP"

          xcrun simctl uninstall "$UDID" ai.agentunited.app || true
          xcrun simctl install "$UDID" "$APP"
          xcrun simctl launch "$UDID" ai.agentunited.app || true
          sleep 5

          xcrun simctl spawn "$UDID" log show --style compact --last 3m --predicate 'process == "AgentUnited" OR eventMessage CONTAINS[c] "AgentUnited"' > /tmp/sim-agentunited.log || true
          echo "--- Simulator app logs (tail) ---"
          tail -n 200 /tmp/sim-agentunited.log || true

          if grep -Eiq 'fatal error|terminating app due to uncaught exception|EXC_BAD_ACCESS|SIGABRT|crash|assertion failed' /tmp/sim-agentunited.log; then
            echo "Smoke test detected crash signature in simulator logs"
            exit 1
          fi

      - name: Build archive
        run: |
          xcodebuild archive \
            -project apps/ios/AgentUnited.xcodeproj \
            -scheme AgentUnited \
            -configuration Release \
            -archivePath /tmp/AgentUnited.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=G8QPW9SH2T \
            PROVISIONING_PROFILE_SPECIFIER="AgentUnited iOS Distribution"
          ls /tmp/AgentUnited.xcarchive

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>ai.agentunited.app</key>
                  <string>AgentUnited iOS Distribution</string>
              </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath /tmp/AgentUnited.xcarchive \
            -exportPath /tmp/AgentUnited-export \
            -exportOptionsPlist /tmp/ExportOptions.plist
          ls /tmp/AgentUnited-export/

      - name: Upload to TestFlight
        env:
          KEY_B64: ${{ secrets.ASC_API_KEY_BASE64 }}
          KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # altool requires key in ~/.appstoreconnect/private_keys/ — --apiKeyFilePath is ignored
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$KEY_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          IPA=$(ls /tmp/AgentUnited-export/*.ipa | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --show-progress

      - name: Set export compliance + add to beta group
        env:
          KEY_B64: ${{ secrets.ASC_API_KEY_BASE64 }}
          KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_ID: "6760973893"
          BETA_GROUP_ID: "d1d10e26-9293-4fa0-8dec-58e9b2309580"
        run: |
          pip3 install PyJWT requests --quiet
          python3 << 'PY'
          import jwt, time, requests, json, os

          key = open(os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{os.environ['KEY_ID']}.p8")).read()
          token = jwt.encode({
              'iss': os.environ['ISSUER_ID'],
              'iat': int(time.time()),
              'exp': int(time.time()) + 1200,
              'aud': 'appstoreconnect-v1'
          }, key, algorithm='ES256', headers={'kid': os.environ['KEY_ID']})

          headers = {'Authorization': f'Bearer {token}'}

          # Get latest build
          r = requests.get(f"https://api.appstoreconnect.apple.com/v1/builds?filter[app.id]={os.environ['APP_ID']}&sort=-uploadedDate&limit=1", headers=headers)
          build = r.json()['data'][0]
          build_id = build['id']
          print(f"Latest build: {build['attributes']['version']} (ID: {build_id})")

          # Set export compliance
          compliance_data = {
              'data': {
                  'type': 'builds',
                  'id': build_id,
                  'attributes': {
                      'usesNonExemptEncryption': False
                  }
              }
          }
          r = requests.patch(f"https://api.appstoreconnect.apple.com/v1/builds/{build_id}", headers={**headers, 'Content-Type': 'application/json'}, json=compliance_data)
          print(f"Export compliance: {r.status_code}")

          # Add to beta group
          group_data = {
              'data': [{
                  'type': 'builds',
                  'id': build_id
              }]
          }
          r = requests.post(f"https://api.appstoreconnect.apple.com/v1/betaGroups/{os.environ['BETA_GROUP_ID']}/relationships/builds", headers={**headers, 'Content-Type': 'application/json'}, json=group_data)
          print(f"Added to beta group: {r.status_code}")
          PY
