name: Integration Test (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, macos-local]
    steps:
      - uses: actions/checkout@v4

      - name: Run setup.sh
        run: ./setup.sh

      - name: Wait for services healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose ps | grep -v "healthy" | grep -q "starting\|unhealthy"; then
              sleep 2
            else
              echo "All services ready"
              break
            fi
          done

      - name: Smoke tests
        run: |
          BASE=http://localhost:8080/api/v1
          curl -sf $BASE/../health || exit 1
          TOKEN=$(curl -sf -X POST $BASE/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-mac@test.com","password":"testpass123","display_name":"CI Mac"}' \
            | jq -r '.token')
          [ -z "$TOKEN" ] && exit 1
          echo "macOS smoke tests passed ✅"

      - name: Cleanup
        if: always()
        run: docker compose down -v
