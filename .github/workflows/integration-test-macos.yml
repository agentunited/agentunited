name: Integration Test (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, macos-local]
    env:
      DOCKER_HOST: unix:///Users/autumnfox/.colima/default/docker.sock
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker availability
        id: docker_check
        run: |
          if docker info > /dev/null 2>&1; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Docker not available — skipping integration tests"
          fi

      - name: Pre-clean docker state
        if: steps.docker_check.outputs.available == 'true'
        run: |
          docker compose down -v || true
          docker rm -f agentunited-web agentunited-api agentunited-postgres agentunited-redis agentunited-centrifugo || true

      - name: Run setup.sh
        if: steps.docker_check.outputs.available == 'true'
        run: chmod +x ./setup.sh && ./setup.sh

      - name: Wait for services healthy
        if: steps.docker_check.outputs.available == 'true'
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if docker compose ps | grep -v "healthy" | grep -q "starting\|unhealthy"; then
              sleep 2
            else
              curl -sf http://localhost:8080/health >/dev/null
              echo "All services ready"
              break
            fi
          done

      - name: Smoke tests
        if: steps.docker_check.outputs.available == 'true'
        run: |
          set -euo pipefail
          BASE=http://localhost:8080/api/v1
          TS=$(date +%s)

          code=$(curl -s -o /tmp/health.json -w '%{http_code}' http://localhost:8080/health)
          [ "$code" = "200" ] || { cat /tmp/health.json; exit 1; }

          BOOT_EMAIL="agent-mac+$TS@example.com"
          HUMAN_EMAIL="human-mac+$TS@example.com"
          HUMAN_EMAIL="human+$TS@example.com"
          code=$(curl -s -o /tmp/bootstrap.json -w '%{http_code}' -X POST $BASE/bootstrap \
            -H "Content-Type: application/json" \
            -d "{\"primary_agent\":{\"email\":\"$BOOT_EMAIL\",\"password\":\"BootstrapPass123!\",\"agent_profile\":{\"name\":\"ci-mac-agent\",\"display_name\":\"CI Mac Agent\"}},\"humans\":[{\"email\":\"$HUMAN_EMAIL\",\"display_name\":\"CI Human\",\"role\":\"member\"}]}")
          ([ "$code" = "200" ] || [ "$code" = "201" ]) || { cat /tmp/bootstrap.json; exit 1; }
          INVITE=$(jq -r '.humans[0].invite_url // .invite_url // empty' /tmp/bootstrap.json)
          [ -n "$INVITE" ] || { cat /tmp/bootstrap.json; exit 1; }

          REG_EMAIL="ci-mac+$TS@example.com"
          code=$(curl -s -o /tmp/register.json -w '%{http_code}' -X POST $BASE/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$REG_EMAIL\",\"password\":\"testpass123\"}")
          [ "$code" = "201" ] || { cat /tmp/register.json; exit 1; }
          TOKEN=$(jq -r '.token // empty' /tmp/register.json)
          [ -n "$TOKEN" ] || { cat /tmp/register.json; exit 1; }

          code=$(curl -s -o /tmp/channel.json -w '%{http_code}' -X POST $BASE/channels \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-mac-test","topic":"CI macOS channel"}')
          [ "$code" = "201" ] || { cat /tmp/channel.json; exit 1; }
          CHANNEL_ID=$(jq -r '.channel.id // .id // empty' /tmp/channel.json)
          [ -n "$CHANNEL_ID" ] && [ "$CHANNEL_ID" != "null" ] || { cat /tmp/channel.json; exit 1; }

          code=$(curl -s -o /tmp/message.json -w '%{http_code}' -X POST $BASE/channels/$CHANNEL_ID/messages \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"text":"hello from macOS CI"}')
          [ "$code" = "201" ] || { 
            echo "Message send failed: $code"
            cat /tmp/message.json
            echo "--- DOCKER PS ---"
            docker ps
            echo "--- API LOGS ---"
            docker compose logs api || docker logs agentunited-api || true
            exit 1 
          }

          echo "macOS smoke tests passed ✅"

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v || true
          docker rm -f agentunited-web agentunited-api agentunited-postgres agentunited-redis agentunited-centrifugo || true
