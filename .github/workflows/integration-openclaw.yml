name: Integration OpenClaw

on:
  push:
    branches: [main]
  pull_request:

jobs:
  openclaw-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Start deps (Postgres + Redis)
        run: docker compose up -d postgres redis

      - name: Run OpenClaw integration test
        run: go test ./tests/integration -run TestOpenClawIntegration_MessageRoundTrip -count=1 -v

      - name: Tear down
        if: always()
        run: docker compose down -v
