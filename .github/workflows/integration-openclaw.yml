name: Integration OpenClaw

on:
  push:
    branches: [main]
  pull_request:

jobs:
  openclaw-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Start deps (Postgres + Redis)
        env:
          DB_NAME: agentunited_test
        run: |
          docker compose up -d postgres redis
          sleep 5

      - name: Run OpenClaw integration test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/agentunited_test?sslmode=disable
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: agentunited_test
          DB_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: go test ./tests/integration -run TestOpenClawIntegration_MessageRoundTrip -count=1 -v

      - name: Ensure env file exists for compose teardown
        if: always()
        run: touch .env

      - name: Tear down
        if: always()
        run: docker compose down -v
