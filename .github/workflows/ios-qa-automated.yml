name: iOS Full QA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours

jobs:
  ios-qa:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint — iOS runtime crash patterns
        run: |
          # detectPatterns fires on pasteboard background queue; crashes on iOS 26
          # if closure was created in @MainActor context (EXC_BREAKPOINT, Build 29).
          if grep -rn "detectPatterns" apps/ios --include="*.swift"; then
            echo "ERROR: detectPatterns usage found. Route through nonisolated intermediate."
            exit 1
          fi
          echo "OK: No dangerous pasteboard patterns found."

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Build for simulator
        run: |
          xcodebuild build \
            -derivedDataPath /tmp/derived-data \
            -project apps/ios/AgentUnited.xcodeproj \
            -scheme AgentUnited \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -20

      - name: Boot simulator + install app
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for rt, devs in d['devices'].items():
              if 'iOS 26' in rt or 'iOS-26' in rt:
                  for dev in devs:
                      if 'iPhone 16 Pro' in dev['name'] and dev['isAvailable']:
                          print(dev['udid']); exit()
          for rt, devs in d['devices'].items():
              for dev in devs:
                  if 'iPhone' in dev['name'] and dev['isAvailable']:
                      print(dev['udid']); exit()
          ")
          echo "udid=$UDID" >> $GITHUB_OUTPUT
          xcrun simctl boot "$UDID" 2>/dev/null || true
          sleep 3
          APP=$(find /tmp/derived-data/Build/Products -name "AgentUnited.app" -path "*/Debug-iphonesimulator/*" | head -1)
          xcrun simctl install "$UDID" "$APP"

      - name: QA - A0. App launches without crash
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl launch "$UDID" ai.agentunited.app && echo "LAUNCH_OK" || echo "LAUNCH_FAILED"
          sleep 5
          # Check if process is still alive
          xcrun simctl spawn "$UDID" launchctl list | grep agentunited || (echo "FAIL: App crashed on launch" && exit 1)
          echo "PASS: App launched and stayed alive"

      - name: QA - A1. Onboarding screen renders
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl io "$UDID" screenshot /tmp/qa-a1.png
          # Verify screenshot is not blank/crash screen by checking file size
          SIZE=$(stat -f%z /tmp/qa-a1.png)
          [ "$SIZE" -gt 100000 ] || (echo "FAIL: Screenshot too small (blank/crash)" && exit 1)
          echo "PASS: Screenshot captured (${SIZE} bytes)"

      - name: QA - App survives 60 seconds
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          for i in {1..12}; do
            sleep 5
            xcrun simctl spawn "$UDID" launchctl list | grep agentunited || (echo "FAIL: App crashed after $((i*5))s" && exit 1)
          done
          echo "PASS: App alive for 60 seconds"

      - name: Capture logs
        if: always()
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          echo "=== APP LOGS ===" 
          xcrun simctl spawn "$UDID" log show --predicate 'process == "AgentUnited"' --last 2m --style compact 2>/dev/null | tail -100
          echo "=== CRASH LOGS ==="
          find ~/Library/Logs/DiagnosticReports -name "AgentUnited*" -mmin -10 2>/dev/null | head -5
          echo "=== SIMULATOR CRASH LOGS ==="
          find ~/Library/Developer/CoreSimulator/Devices/$UDID/data/Library/CrashReporter -name "*.ips" -mmin -10 2>/dev/null | head -5

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-qa-screenshots
          path: /tmp/qa-*.png

      - name: Shutdown simulator
        if: always()
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl shutdown "$UDID" 2>/dev/null || true
