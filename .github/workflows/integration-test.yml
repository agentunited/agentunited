name: Integration Test (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup.sh
        run: ./setup.sh

      - name: Wait for services healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            if docker compose ps | grep -v "healthy" | grep -q "starting\|unhealthy"; then
              sleep 2
            else
              echo "All services ready"
              break
            fi
          done

      - name: Smoke tests
        run: |
          BASE=http://localhost:8080/api/v1

          # Health check
          curl -sf $BASE/../health || exit 1

          # Register
          TOKEN=$(curl -sf -X POST $BASE/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.com","password":"testpass123","display_name":"CI Bot"}' \
            | jq -r '.token')
          [ -z "$TOKEN" ] && exit 1

          # Create channel
          CHANNEL_ID=$(curl -sf -X POST $BASE/channels \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-test","description":"CI test channel"}' \
            | jq -r '.id')
          [ -z "$CHANNEL_ID" ] && exit 1

          # Send message
          curl -sf -X POST $BASE/channels/$CHANNEL_ID/messages \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"content":"hello from CI"}' || exit 1

          # Bootstrap
          INVITE=$(curl -sf -X POST $BASE/bootstrap \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"agent_name":"ci-agent","display_name":"CI Agent"}' \
            | jq -r '.invite_url')
          [ -z "$INVITE" ] && exit 1

          echo "All smoke tests passed ✅"

      - name: Cleanup
        if: always()
        run: docker compose down -v
